<!DOCTYPE html>
<html xmlns="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}">
    <title>Nuovo contatto</title>
</head>
<body>
    <div class="container d-flex flex-colum" style="margin-top: 50px;">
        <header class="my-2 main-header">
            <a th:href="@{/}" class="btn btn-primary">Home</a>
        </header>

    </div>
        <div>
        <div class="row justify-content-center">
        <div class="col-sm-6">
                <!-- form di inserimento nuovo contatto
                                                        associo l'oggetto ContactForm -->
                <form method="post" th:action="@{/new}" th:object="${contactForm}">
                    <div class="mb-3">
                        <label>Nome</label>
                        <!-- collego il campo all'attributo "name" della classe -->
                        <input th:field="*{name}" type="text" class="form-control">

                        <!-- Feedback validazione -->
                        <div th:if="${#fields.hasErrors('name')}">
                            <span th:errors="*{name}" class="text-danger"></span>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label>Cognome</label>
                        <input th:field="*{surname}" type="text"class="form-control">
                        <!-- Feedback validazione -->
                        <div th:if="${#fields.hasErrors('surname')}">
                            <span th:errors="*{surname}" class="text-danger"></span>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label>Telefono</label>
                        <input th:field="*{phoneNumber}" type="tel" class="form-control" pattern="[0-9]{10}">
                        <!-- Feedback validazione -->
                        <div th:if="${#fields.hasErrors('phoneNumber')}">
                            <span th:errors="*{phoneNumber}" class="text-danger"></span>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label>Email</label>
                        <input th:field="*{email}" type="email" placeholder="email@example.com" class="form-control">
                        <!-- Feedback validazione -->
                        <div th:if="${#fields.hasErrors('email')}">
                            <span th:errors="*{email}" class="text-danger"></span>
                        </div>
                    </div>
                    <div class="mb-3">
                        <input class="btn btn-success" type="submit" value="Aggiungi">
                        <input class="btn btn-secondary" type="reset" value="Reset">
                        <input class="btn btn-warning" type="button" value="Elimina">
                    </div>

                </form>
            </div>
        </div>
    </div>
  
    <script th:src="@{/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
